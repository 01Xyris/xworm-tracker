<!DOCTYPE html>
<html>
<head>
        <meta name="robots" content="noindex, noarchive">
    <meta name="googlebot" content="noindex, noarchive">
    <title>Graph - :3</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.js"></script>
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">Correlation Graph</div>
        </div>
        <div class="window-body">
            <div class="sidebar">
                <div class="menu-section">
                    <div class="menu-header">Menu</div>
                    <a href="{{ url_for('dashboard.dashboard') }}" class="menu-item">Dashboard</a>
                    <a href="{{ url_for('connections.connections') }}" class="menu-item">Connections</a>
                    <a href="{{ url_for('files.files') }}" class="menu-item">Files</a>
                    <a href="{{ url_for('graph.graph') }}" class="menu-item active">Graph</a>
                    <a href="{{ url_for('targets.add_target') }}" class="menu-item">Add Target</a>
                </div>
                <div class="menu-section">
                    <a href="{{ url_for('auth.logout') }}" class="menu-item">Logout</a>
                </div>
            </div>
            <div class="content">
                <div id="graph-container" style="position: relative; background: #0f0f0f; border: 2px solid #333; border-top-color: #222; border-left-color: #222; border-right-color: #555; border-bottom-color: #555; height: 600px;">
                    <div id="loading" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #7b68a8;">
                        <div style="font-size: 14px; font-weight: bold; margin-bottom: 10px;">Loading graph...</div>
                        <div style="font-size: 11px; color: #a0a0a0;">Please wait</div>
                    </div>
                    <div id="graph" style="width: 100%; height: 100%; display: none;"></div>
                </div>
            </div>
        </div>
        <div class="status-bar">Wdapdiapdadap</div>
    </div>
    <script src="{{ url_for('static', filename='graph.js') }}"></script>
</body>
</html>
